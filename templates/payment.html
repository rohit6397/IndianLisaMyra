<!DOCTYPE html>

<html>

<head>

<title>Payment</title>

<link rel="stylesheet"
href="{{ url_for('static',
filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>IndianLisaMyra</h1>

<h2>Premium Membership Payment</h2>

<img
src="{{ url_for(
'static',
filename='images/qr.jpg'
) }}"
width="250">

<br><br>

<h3>Scan QR Code And Pay</h3>

<p>🎥 Video Call : ₹3000</p>

<p>🎧 Audio Call : ₹2000</p>

<br>

<form action="/success">

<input

id="txn"

type="text"

placeholder="Transaction ID"

required>

<br><br>

<input

id="proof"

type="file"

required>

<br><br>

<button

id="submitBtn"

disabled>

Submit Payment

</button>

</form>

<br><br>

<a href="/membership">

<button>

Back

</button>

</a>

</div>

<script>

const txn =
document.getElementById(
'txn'
);

const proof =
document.getElementById(
'proof'
);

const btn =
document.getElementById(
'submitBtn'
);

function validate(){

if(

txn.value.trim() !== ''

&&

proof.files.length > 0

){

btn.disabled = false;

}

else{

btn.disabled = true;

}

}

txn.addEventListener(
'input',
validate
);

proof.addEventListener(
'change',
validate
);

</script>

</body>

</html>
